<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FinTrack - Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1 class="title">💰 FinTrack Expense Tracker</h1>

    <!-- Instructions -->
    <p class="info">
        Enter positive amount for income and negative for expense
    </p>

    <!-- Balance -->
    <div class="card balance-card">
        <h3>Your Balance</h3>
        <h2 id="balance">₹0</h2>
    </div>

    <!-- Summary -->
    <div class="summary">
        <div class="card income">
            <h4>Income</h4>
            <p id="money-plus">₹0</p>
        </div>

        <div class="card expense">
            <h4>Expense</h4>
            <p id="money-minus">₹0</p>
        </div>
    </div>

    <!-- History -->
    <div class="card">
        <h3>History</h3>
        <ul id="list"></ul>
    </div>

    <!-- Add Transaction -->
    <div class="card">
        <h3>Add Transaction</h3>

        <form id="form">
            <input type="text" id="text"
                   placeholder="Example: Salary, Food, Rent" required>

            <input type="number" id="amount"
                   placeholder="Example: +5000 or -200" required>

            <button class="btn">Add Transaction</button>
        </form>
    </div>

    <!-- Clear -->
    <button id="clear" class="clear-btn">Clear All</button>

    <!-- Footer -->
    <p class="footer">Made with ❤️ using FinTrack</p>

</div>

<script src="script.js"></script>
</body>
</html>
